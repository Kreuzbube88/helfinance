name: 🐛 Bug Report
description: Report a bug or unexpected behavior in HELFINANCE
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: version
    attributes:
      label: Version
      options:
        - latest
        - custom build
        - don't know
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Unraid (Community App)
        - Docker Compose
        - Docker CLI
        - Other
    validations:
      required: true

  - type: input
    id: browser_device
    attributes:
      label: Browser / Device
      placeholder: "e.g. Chrome 123 on Windows 11, Safari on iPhone 15"
    validations:
      required: false

  - type: dropdown
    id: affected_area
    attributes:
      label: Affected Area
      options:
        - Dashboard
        - Bookings (Income/Expenses)
        - Loans
        - Savings
        - Reports
        - Admin Panel
        - PWA/Mobile
        - Authentication/Login
        - Other
    validations:
      required: true

  - type: textarea
    id: bug_description
    attributes:
      label: Bug Description
      placeholder: "Describe what went wrong..."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to Bookings → Expenses
        2. Click Add Expense
        3. Enter: Name=Insurance, Amount=300, Interval=Quarterly
        4. See incorrect monthly preview
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      placeholder: "Monthly preview should show 100€ (300€ / 3 months)"
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      placeholder: "What actually happened..."
    validations:
      required: true

  - type: textarea
    id: logs_screenshots
    attributes:
      label: Logs / Screenshots
      placeholder: |
        Paste relevant logs here (docker logs helfinance) or attach screenshots.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I am running the latest version
          required: false
        - label: I have included logs and/or screenshots
          required: false
